# Configuração do Nginx como API Gateway da aplicação.
events {
    worker_connections 1024;
}

http {
    # Upstream do serviço de pedidos.
    upstream orders_service {
        server orders-service:5001;
    }

    # Upstream do serviço financeiro.
    upstream finance_service {
        server finance-service:5002;
    }

    server {
        listen 80;

        # Prefixo /orders encaminha para o orders-service.
        location /orders/ {
            rewrite ^/orders/?(.*)$ /$1 break;
            proxy_pass http://orders_service;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Prefixo /finance encaminha para o finance-service.
        location /finance/ {
            rewrite ^/finance/?(.*)$ /$1 break;
            proxy_pass http://finance_service;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Endpoint raiz com descrição rápida das rotas disponíveis.
        location / {
            return 200 '{"message":"Scale-to-Insight gateway","routes":["/orders/health","/orders/orders","/finance/health","/finance/kpis"]}';
            add_header Content-Type application/json;
        }
    }
}
