name: CI/CD Pipeline – Scale-to-Insight

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test-simulation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose
        run: docker compose config

      - name: Build services
        run: docker compose build

      - name: Deploy simulation (docker compose up)
        run: docker compose up -d

      - name: Wait services
        run: |
          sleep 25
          curl -f http://localhost:8080/orders/health
          curl -f http://localhost:8080/finance/health

      - name: Send sample sale and check KPI endpoint
        run: |
          curl -f -X POST http://localhost:8080/orders/orders \
            -H "Content-Type: application/json" \
            -d '{"amount": 199.9, "payment_method": "pix", "status": "approved"}'
          sleep 10
          curl -f http://localhost:8080/finance/kpis

      - name: Shutdown environment
        if: always()
        run: docker compose down -v

  # --- JOB 2: DEPLOY EM PRODUÇÃO (CD) ---
  deploy-to-production:
    needs: build-and-test-simulation
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Official Images
        run: |
          docker compose build
          docker compose push

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GIT_PAT
          script: |
            set -e
            mkdir -p ~/app/scale-to-insight
            cd ~/app/scale-to-insight
            
            # Sincronização do repositório
            if [ ! -d ".git" ]; then
              git clone https://$GIT_PAT@github.com/${{ github.repository }}.git .
            else
              git remote set-url origin https://$GIT_PAT@github.com/${{ github.repository }}.git
              git pull origin main
            fi
            
            mkdir -p data/raw data/warehouse
            
            # 2. Cria o arquivo do banco apenas se ele NÃO existir (preserva dados antigos)
            if [ ! -f data/warehouse/warehouse.db ]; then
                touch data/warehouse/warehouse.db
            fi
            
            chmod -R 777 data/
            
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
